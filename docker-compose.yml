
name: ${PROJECT_NAME}

services:
  mongodb:
    image: ${MONGO_IMAGE}
    container_name: ${MONGO_CONTAINER}
    restart: unless-stopped
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    networks:
      - news-network

  valkey:
    image: ${VALKEY_IMAGE}
    container_name: ${VALKEY_CONTAINER}
    restart: unless-stopped
    ports:
      - "${VALKEY_PORT}:6379"
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    networks:
      - news-network

volumes:
  mongo_data:

networks:
  news-network:
    driver: bridge
